name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build release binaries
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        shell: bash
        run: |
          set -eu

          mkdir -p dist

          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            EXT=".exe"
          fi

          # Important:
          # The binary name inside the archive should stay stable.
          # This allows tools like mise/github backend to expose `zjsh`.
          OUTPUT="dist/zjsh${EXT}"

          VERSION="${{ github.ref_name }}" \
          GOOS="${{ matrix.goos }}" \
          GOARCH="${{ matrix.goarch }}" \
          OUTPUT="${OUTPUT}" \
          ./scripts/build.sh

      - name: Archive
        shell: bash
        run: |
          set -eu

          cd dist

          VERSION="${{ github.ref_name }}"
          GOOS="${{ matrix.goos }}"
          GOARCH="${{ matrix.goarch }}"

          ARCHIVE_NAME="zjsh-${VERSION}-${GOOS}-${GOARCH}"

          if [ "${GOOS}" = "windows" ]; then
            zip "${ARCHIVE_NAME}.zip" "zjsh.exe"
            rm "zjsh.exe"
          else
            tar -czf "${ARCHIVE_NAME}.tar.gz" "zjsh"
            rm "zjsh"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zjsh-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -eu

          cd dist
          sha256sum * | sort -k2 > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*
